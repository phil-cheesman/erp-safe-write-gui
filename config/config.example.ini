[database]
# Option A: Use a pre-configured ODBC DSN
dsn = MY_DSN

# Option B: Full connection string (overrides dsn if set)
# connection_string = DRIVER={ODBC Driver 18 for SQL Server};SERVER=myserver;DATABASE=mydb;Trusted_Connection=yes

# Credentials (optional — omit if DSN or connection string includes them)
# Can also be set via env vars: ESTSHIP_DB_USER, ESTSHIP_DB_PASSWORD
# username =
# password =

[settings]
# Database name for USE statement
database = my_database

# Query timeout in seconds
query_timeout = 30

# Max rows to display in validation previews
preview_rows = 20

[logging]
# Log file location (relative to exe or absolute)
log_file = estship_upload.log

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = INFO
